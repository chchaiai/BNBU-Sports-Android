limit_req_zone $binary_remote_addr zone=bnbu_api:10m rate=100r/s;

server {
    listen 80;
    listen [::]:80;
    server_name api.example.edu.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.edu.cn;

    ssl_certificate /etc/letsencrypt/live/api.example.edu.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.edu.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 120m;
    limit_req_status 429;
    error_page 413 = @json_413;
    error_page 429 = @json_429;

    location /api/ {
        # The higher IP allowance is intentional: a campus can place many students behind one NAT address.
        # Login brute-force protection is account-keyed in the application.
        limit_req zone=bnbu_api burst=300 nodelay;
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    location = /api/health {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location @json_413 {
        internal;
        default_type application/json;
        add_header X-Request-Id $request_id always;
        return 413 '{"code":"REQUEST_TOO_LARGE","message":"Request body is too large","requestId":"$request_id"}';
    }

    location @json_429 {
        internal;
        default_type application/json;
        add_header X-Request-Id $request_id always;
        return 429 '{"code":"RATE_LIMITED","message":"Too many requests; retry later","requestId":"$request_id"}';
    }
}
